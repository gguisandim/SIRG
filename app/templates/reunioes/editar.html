{% extends "base.html" %}

{% block title %}Editar Reunião{% endblock %}

{% block content %}

<style>
  .page-header {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    max-width: 650px;
    margin: 0 auto 32px;
  }

  .page-header-icon {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--blue), #3b82f6);
    border-radius: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 2px 10px rgba(29,78,216,0.25);
    flex-shrink: 0;
  }

  .page-header-text h1 {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    margin: 0;
  }

  .page-header-text p {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 300;
    margin-top: 2px;
  }

  .form-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 36px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    max-width: 650px;
    width: 100%;
    margin: 0 auto;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .form-section-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 18px;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }

  .field-group {
    margin-bottom: 20px;
  }

  .field-group label {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 7px;
  }

  .field-group input,
  .field-group select,
  .field-group textarea {
    width: 100%;
    padding: 10px 14px;
    font-family: 'Sora', sans-serif;
    font-size: 13.5px;
    color: var(--text);
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 9px;
    outline: none;
  }

  .field-group textarea {
    resize: vertical;
    min-height: 130px;
    line-height: 1.6;
  }

  .field-group input:focus,
  .field-group select:focus,
  .field-group textarea:focus {
    border-color: var(--blue);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(29,78,216,0.08);
  }

  .form-divider {
    height: 1px;
    background: var(--border);
    margin: 28px 0;
  }

  .form-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 24px;
    background: linear-gradient(135deg, var(--orange), #ea6c0a);
    color: #fff;
    font-family: 'Sora', sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    border: none;
    border-radius: 9px;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 2px 10px rgba(249,115,22,0.3);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 11px 20px;
    background: none;
    color: var(--text-muted);
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    font-weight: 500;
    border: 1.5px solid var(--border);
    border-radius: 9px;
    cursor: pointer;
    text-decoration: none;
  }

  .btn-secondary:hover {
    background: var(--bg);
    color: var(--text);
    text-decoration: none;
  }

  @media (max-width: 720px) {
    .page-header,
    .form-card {
      max-width: 100%;
    }

    .field-row {
      grid-template-columns: 1fr;
    }

    .form-card {
      padding: 28px 22px;
    }

    .form-actions {
      flex-direction: column;
      align-items: stretch;
    }

    .btn-primary,
    .btn-secondary {
      justify-content: center;
      width: 100%;
    }
  }
</style>

<div class="page-header">
  <div class="page-header-icon">✏️</div>

  <div class="page-header-text">
    <h1>Editar Reunião</h1>
    <p>Atualize os dados da reunião cadastrada.</p>
  </div>
</div>

<div class="form-card">
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <p class="form-section-label">Identificação</p>

    <div class="field-group">
      <label for="titulo">Título da Reunião</label>
      <input 
        type="text" 
        id="titulo" 
        name="titulo" 
        value="{{ reuniao.titulo }}"
        required
      >
    </div>

    <div class="field-row">
      <div class="field-group">
        <label for="data">Data</label>
        <input 
          type="date" 
          id="data" 
          name="data" 
          value="{{ reuniao.data.strftime('%Y-%m-%d') }}"
          required
        >
      </div>

      <div class="field-group">
        <label for="horario">Horário</label>
        <input 
          type="time" 
          id="horario" 
          name="horario" 
          value="{{ reuniao.horario.strftime('%H:%M') }}"
          required
        >
      </div>
    </div>

    <div class="form-divider"></div>

    <p class="form-section-label">Detalhes</p>

    <div class="field-row">
      <div class="field-group">
        <label for="tipo">Tipo de Reunião</label>
        <select id="tipo" name="tipo" required>
          <option value="Ordinária" {% if reuniao.tipo == 'Ordinária' %}selected{% endif %}>Ordinária</option>
          <option value="Extraordinária" {% if reuniao.tipo == 'Extraordinária' %}selected{% endif %}>Extraordinária</option>
        </select>
      </div>

      <div class="field-group">
        <label for="local">Local</label>
        <select id="local" name="local" required>
          <option value="NEB01" {% if reuniao.local == 'NEB01' %}selected{% endif %}>NEB01</option>
          <option value="NEB02" {% if reuniao.local == 'NEB02' %}selected{% endif %}>NEB02</option>
          <option value="NEB03" {% if reuniao.local == 'NEB03' %}selected{% endif %}>NEB03</option>
          <option value="NEB04" {% if reuniao.local == 'NEB04' %}selected{% endif %}>NEB04</option>
          <option value="NEB05" {% if reuniao.local == 'NEB05' %}selected{% endif %}>NEB05</option>
          <option value="NEB06" {% if reuniao.local == 'NEB06' %}selected{% endif %}>NEB06</option>
        </select>
      </div>
    </div>

    <div class="field-group">
  <label for="numero_oficio">Número do Ofício</label>
  <input 
    type="number" 
    id="numero_oficio" 
    name="numero_oficio" 
    value="{{ reuniao.numero_oficio or '' }}"
    placeholder="Ex: 12"
  >
</div>

    <div class="field-group">
      <label for="pauta">Pauta da Reunião</label>
      <textarea 
        id="pauta" 
        name="pauta"
        placeholder="Digite a pauta da reunião..."
      >{{ reuniao.pauta or '' }}</textarea>
    </div>

    <div class="form-divider"></div>

    <div class="form-actions">
      <button type="submit" class="btn-primary">
        Salvar alterações
      </button>

      <button type="button" id="btn-gerar-pauta-ia" class="btn btn-outline-primary">
    🤖 Gerar pauta com IA
      </button>

      <a href="{{ url_for('reunioes.detalhes_reuniao', id=reuniao.id) }}" class="btn-secondary">
        Cancelar
      </a>

      <a href="{{ url_for('reunioes.listar_reunioes') }}" class="btn-secondary">
        Voltar para lista
      </a>
    </div>
  </form>
</div>


<script>
document.addEventListener("DOMContentLoaded", function () {
    const botao = document.getElementById("btn-gerar-pauta-ia");
    const campoPauta = document.getElementById("pauta");

    if (!botao || !campoPauta) {
        return;
    }

    botao.addEventListener("click", async function () {
        botao.disabled = true;
        botao.innerText = "Gerando pauta...";

        const dados = {
            titulo: document.querySelector("[name='titulo']")?.value || "",
            data: document.querySelector("[name='data']")?.value || "",
            horario: document.querySelector("[name='horario']")?.value || "",
            local: document.querySelector("[name='local']")?.value || "",
            tipo: document.querySelector("[name='tipo']")?.value || "",
            pauta: campoPauta.value || ""
        };

        try {
            const resposta = await fetch("{{ url_for('reunioes.gerar_pauta_ia_cadastro') }}", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": "{{ csrf_token() }}"
                },
                body: JSON.stringify(dados)
            });

            const resultado = await resposta.json();

            if (!resposta.ok || !resultado.sucesso) {
                alert("Erro: " + (resultado.erro || "Não foi possível gerar a pauta."));
                return;
            }

            campoPauta.value = resultado.texto;

        } catch (erro) {
            console.error(erro);
            alert("Erro ao conectar com a IA.");
        } finally {
            botao.disabled = false;
            botao.innerText = "🤖 Gerar pauta com IA";
        }
    });
});
</script>

{% endblock %}
